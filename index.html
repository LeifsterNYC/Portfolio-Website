<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leif's Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>
<body>
    <div class="scene">
        <div class="monitor">
            <div class="crt">
                <div class="screen">
                    <div class="terminal">
                        <p>WELCOME TO LEIF'S PORTFOLIO</p>
                        <br>
                        <p>> <span id="projects-link" class="clickable">PROJECTS</span></p>
                        <p>To see my projects</p>
                        <br>
                        <div id="output"></div>
                        <div class="input-line">
                            <span>&gt;</span>
                            <input type="text" id="command-input" autofocus>
                        </div>
                    </div>
                </div>
            </div>
            <div class="monitor-chin">
                <div class="cart-slot">
                    <div class="cart-slot-opening"></div>
                </div>
                <div class="monitor-badge">
                    <svg class="monitor-logo" viewBox="0 0 24 24" width="14" height="14" fill="none">
                        <path d="M17 8C8 10 5.9 16.17 3.82 21.34L5.71 22l1-2.3A4.49 4.49 0 0 0 8 20c4 0 6-4 6-8s2-4 3-4" stroke="#7a7664" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M11 2c2 2 2 6-1 9" stroke="#7a7664" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span class="monitor-name">Leif Classic</span>
                </div>
            </div>
        </div>

        <div class="shelf">
            <div class="case-body">
                <div class="case-rim">
                    <span class="case-led"></span>
                </div>
                <div class="case-tray">
                    <div class="cartridge" data-name="WeatherML" data-url="/weatherml/" role="button" tabindex="0">
                        <div class="cart-body">
                            <div class="cart-grip"></div>
                            <div class="cart-label">
                                <div class="cart-label-art" style="background-image: url('./cartridge1.png');"></div>
                            </div>
                            <div class="cart-title">WeatherML</div>
                            <div class="cart-pins"></div>
                        </div>
                    </div>
                    <div class="cartridge" data-name="Aphasia Prediction" data-url="/aphasiaprediction/" role="button" tabindex="0">
                        <div class="cart-body">
                            <div class="cart-grip"></div>
                            <div class="cart-label">
                                <div class="cart-label-art" style="background-image: url('./cartridge2.png');"></div>
                            </div>
                            <div class="cart-title">Aphasia</div>
                            <div class="cart-pins"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <p>Created by Leif Rogers &copy; 2025</p>
            <p>
                <a href="https://github.com/leifsternyc" target="_blank">GitHub</a> |
                <a href="mailto:leifrrogers@gmail.com">Contact</a> |
                <a href="https://www.linkedin.com/in/leifrogers/" target="_blank">LinkedIn</a>
            </p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
